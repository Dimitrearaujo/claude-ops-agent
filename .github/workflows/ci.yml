name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Syntax check
        run: |
          python -m py_compile agent.py
          python -m py_compile app/csv_parser.py app/task_analyzer.py app/claude_summarizer.py app/notifier.py
          echo "Syntax check OK"

      - name: Rodar testes (pytest)
        run: pytest tests/ -v

      - name: Todos os testes passaram
        run: echo "CI verde — csv parser + task analyzer + summarizer + notifier validados"
